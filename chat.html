<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Channel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Full page chat styles */
        body {
            background: #f8fafc;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-wrapper {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(15, 23, 42, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat Header */
        .chat-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .chat-header-left .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .chat-header-left .merchant-name {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-header-left .merchant-status {
            font-size: 12px;
            opacity: 0.8;
            display: block;
            margin-top: 2px;
        }
        .chat-header-right {
            display: flex;
            gap: 10px;
        }
        .chat-header-right .header-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .chat-header-right .header-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            background: #f8fafc;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }

        .message-wrapper {
            margin-bottom: 15px;
            display: flex;
        }
        .message-wrapper.system {
            justify-content: center;
        }
        .message-wrapper.merchant {
            justify-content: flex-start;
        }
        .message-wrapper.onboarding {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 12px;
            word-wrap: break-word;
            position: relative;
        }
        .message-wrapper.merchant .message-bubble {
            background: #e2e8f0;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .message-wrapper.onboarding .message-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-wrapper.system .message-bubble {
            background: #fef3c7;
            color: #92400e;
            font-size: 13px;
            max-width: 85%;
            text-align: center;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }
        .message-wrapper.onboarding .message-sender {
            color: #93bbfc;
        }
        .message-wrapper.merchant .message-sender {
            color: #64748b;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            display: block;
        }
        .message-wrapper.onboarding .message-time {
            color: #93bbfc;
        }

        /* Chat Input */
        .chat-input-area {
            padding: 16px 30px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: 0.3s;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .chat-input-area button {
            padding: 12px 30px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .chat-input-area button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .empty-state h3 {
            color: #64748b;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* Date divider */
        .date-divider {
            text-align: center;
            padding: 15px 0;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .date-divider span {
            background: #e2e8f0;
            padding: 4px 16px;
            border-radius: 12px;
        }

        @media (max-width: 640px) {
            .chat-wrapper {
                height: 100vh;
                border-radius: 0;
            }
            .chat-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            .chat-header-right {
                width: 100%;
                justify-content: flex-start;
            }
            .chat-header-right .header-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .chat-messages {
                padding: 15px;
            }
            .chat-input-area {
                padding: 12px 15px;
                flex-wrap: wrap;
            }
            .chat-input-area input {
                font-size: 14px;
            }
            .chat-input-area button {
                padding: 12px 20px;
                font-size: 14px;
            }
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="avatar">💬</div>
                <div>
                    <span class="merchant-name" id="chatMerchantName">Loading...</span>
                    <span class="merchant-status" id="chatMerchantStatus">🟢 Online</span>
                </div>
            </div>
            <div class="chat-header-right">
                <a href="onboarding.html?merchantId=" id="backToDashboardBtn" class="header-btn">
                    ← Dashboard
                </a>
                <a href="merchant.html?merchantId=" id="backToMerchantBtn" class="header-btn">
                    👤 Merchant View
                </a>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <div class="icon">💬</div>
                <h3>No messages yet</h3>
                <p>Start the conversation with the merchant</p>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input type="text" id="chatMessageInput" placeholder="Type a message..." />
            <button id="chatSendBtn">Send</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
