<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Merchant Onboarding</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>

</div>

<div class="wrapper">

    <div class="left-panel">

        <div class="logo">

            🏪

        </div>

        <h1>Merchant<br>Onboarding</h1>

        <p>

            Register your merchant account with our secure onboarding platform.

        </p>

        <div class="features">

            <div class="feature">
                ✔ Fast Registration
            </div>

            <div class="feature">
                ✔ Secure Submission
            </div>

            <div class="feature">
                ✔ Easy Merchant Setup
            </div>

        </div>

    </div>

    <div class="form-panel">

        <form id="merchantForm">

            <h2>Merchant Registration</h2>

            <p class="subtitle">
                Please complete all required information.
            </p>

            <div class="card">

                <h3>🏢 Company Information</h3>

                <div class="row">

                    <div class="field">

                        <label>Company SSM Name</label>

                        <input
                            type="text"
                            id="companyName"
                            placeholder="ABC Sdn Bhd"
                            required>

                    </div>

                    <div class="field">

                        <label>SSM Number</label>

                        <input
                            type="text"
                            id="ssmNumber"
                            placeholder="202401234567">

                    </div>

                </div>

                <div class="field">

                    <label>Business Name</label>

                    <input
                        type="text"
                        id="businessName"
                        placeholder="ABC Cafe">

                </div>

                <div class="field">

                    <label>Store Address</label>

                    <textarea
                        id="address"
                        rows="4"
                        placeholder="Enter store address"></textarea>

                </div>

            </div>

            <div class="card">

                <h3>👤 Business PIC</h3>

                <div class="row">

                    <div class="field">

                        <label>PIC Name</label>

                        <input
                            type="text"
                            id="picName"
                            placeholder="John Tan">

                    </div>

                    <div class="field">

                        <label>Phone Number</label>

                        <input
                            type="tel"
                            id="phone"
                            placeholder="0123456789">

                    </div>

                </div>

                <div class="field">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="merchant@email.com">

                </div>

            </div>

            <div class="card">

                <h3>💳 Merchant Requirements</h3>

                <div class="row">

                    <div class="field">

                        <label>POS Package</label>

                        <select id="package">

                            <option>Basic</option>

                            <option>Standard</option>

                            <option>Premium</option>

                        </select>

                    </div>

                    <div class="field">

                        <label>Number of POS</label>

                        <input
                            type="number"
                            id="posQty"
                            value="1">

                    </div>

                </div>

                <div class="field">

                    <label>Special Requirements</label>

                    <textarea
                        id="notes"
                        rows="4"
                        placeholder="Additional requests..."></textarea>

                </div>

            </div>

            <button type="submit">

                Submit Application →

            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
