<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    
    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <div class="logo">✉</div>
            <h1>Get in Touch</h1>
            <p>We’d love to hear from you — fill out the form below.</p>
        </div>

        <!-- ===== FORM ===== -->
        <form action="#" method="POST">

            <!-- Section: Personal Info -->
            <div class="section">
                <h2>Personal Information</h2>

                <div class="row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="e.g. John" required />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="e.g. Doe" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country">
                        <option value="">Select your country</option>
                        <option value="us">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="ca">Canada</option>
                        <option value="au">Australia</option>
                        <option value="in">India</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Section: Message -->
            <div class="section">
                <h2>Your Message</h2>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="What's this about?" />
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="4" placeholder="Write your message here…" required></textarea>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>

        </form>

    </div>

</body>
</html>
