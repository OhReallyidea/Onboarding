<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📋</div>
            <h1>Onboarding Dashboard</h1>
            <p>Manage merchant onboarding tasks and progress</p>
        </div>

        <!-- Merchant Details Section -->
        <div class="section" id="merchantDetails">
            <h2>Merchant Information</h2>
            <div id="merchantInfo">
                <p>Loading merchant details...</p>
            </div>
        </div>

        <!-- Task List Section -->
        <div class="section" id="taskSection">
            <h2>Onboarding Task List</h2>
            <div id="taskList">
                <p>No tasks available</p>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="section" id="chatSection">
            <h2>Chat Channel</h2>
            <div id="chatBox" style="border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; background: white;">
                <div id="messages" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;">
                    <p style="color: #94a3b8;">No messages yet</p>
                </div>
                <form id="chatForm" style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="Type a message..." style="flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;">
                    <button type="submit" style="width: auto; padding: 12px 25px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Send</button>
                </form>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="window.location.href='index.html'" style="background: #64748b; width: auto; padding: 12px 25px;">← Back to Form</button>
            <button onclick="window.location.href='merchant.html?merchantId=' + getMerchantId()" style="background: #059669; width: auto; padding: 12px 25px;">View Merchant Progress →</button>
        </div>
    </div>

    <script src="onboarding.js"></script>
</body>
</html>
